artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
difficulty_explanation = "Parse a small access log and emit summary stats: total requests, unique client IPs, and the most-requested path."
solution_explanation = "Read the log line by line, split on whitespace for the client IP, regex-extract the HTTP method/path from the quoted request field, tally with collections.Counter, then write total/unique/top to JSON."
verification_explanation = "Compare the report's three fields against values computed independently (by hand) from the fixed environment/access.log, not by re-running the solution's own logic."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []
